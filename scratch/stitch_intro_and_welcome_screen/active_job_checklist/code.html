<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Job Checklist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#355872",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151a1d",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e2428",
                        "text-primary-light": "#121517",
                        "text-primary-dark": "#e8eaea",
                        "text-secondary-light": "#637683",
                        "text-secondary-dark": "#9aaebc",
                        "border-light": "#d6dce0",
                        "border-dark": "#3a464d"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-primary-light dark:text-text-primary-dark font-display min-h-screen flex flex-col">
<div class="flex-1 overflow-y-auto pb-20">
<!-- Header -->
<header class="flex items-center bg-surface-light dark:bg-surface-dark p-4 sticky top-0 z-10 border-b border-border-light dark:border-border-dark">
<button class="flex size-10 shrink-0 items-center justify-center text-text-primary-light dark:text-text-primary-dark mr-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight flex-1">진행 중인 작업</h1>
<button class="flex size-10 shrink-0 items-center justify-center text-primary rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</header>
<!-- Progress Overview -->
<div class="px-4 py-6 bg-surface-light dark:bg-surface-dark mb-2">
<div class="flex justify-between items-end mb-2">
<h2 class="text-2xl font-bold text-primary">진행률 40%</h2>
<span class="text-sm font-medium text-text-secondary-light dark:text-text-secondary-dark">2 / 5 완료</span>
</div>
<div class="w-full bg-border-light dark:bg-border-dark rounded-full h-2.5">
<div class="bg-primary h-2.5 rounded-full" style="width: 40%"></div>
</div>
<p class="text-sm text-text-secondary-light dark:text-text-secondary-dark mt-3">예상 종료 시간: 15:30 (1시간 10분 남음)</p>
</div>
<!-- Room 1: 거실 및 주방 -->
<div class="bg-surface-light dark:bg-surface-dark mb-2 py-4">
<div class="flex justify-between items-center px-4 pb-3">
<h3 class="text-[20px] font-bold">거실 및 주방</h3>
<span class="bg-primary/10 text-primary text-xs font-bold px-2 py-1 rounded">진행중</span>
</div>
<div class="px-4">
<label class="flex gap-x-3 py-3 items-start cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input checked="" class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-border-light dark:border-border-dark bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">check</span>
</div>
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark peer-checked:text-text-secondary-light dark:peer-checked:text-text-secondary-dark peer-checked:line-through transition-all">바닥 진공청소 및 물걸레질</p>
</label>
<label class="flex gap-x-3 py-3 items-start cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input checked="" class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-border-light dark:border-border-dark bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">check</span>
</div>
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark peer-checked:text-text-secondary-light dark:peer-checked:text-text-secondary-dark peer-checked:line-through transition-all">가구 표면 먼지 제거</p>
</label>
<label class="flex gap-x-3 py-3 items-start cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-border-light dark:border-border-dark bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">check</span>
</div>
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark peer-checked:text-text-secondary-light dark:peer-checked:text-text-secondary-dark peer-checked:line-through transition-all">주방 싱크대 및 배수구 청소</p>
</label>
<!-- Photo Upload for Kitchen -->
<div class="ml-8 mt-2 mb-4">
<button class="flex items-center gap-2 text-sm font-medium text-primary bg-primary/10 px-4 py-2 rounded-lg hover:bg-primary/20 transition-colors w-full justify-center">
<span class="material-symbols-outlined text-[20px]">add_a_photo</span>
                        완료 사진 업로드 (선택)
                    </button>
</div>
</div>
</div>
<!-- Room 2: 욕실 -->
<div class="bg-surface-light dark:bg-surface-dark mb-2 py-4">
<div class="flex justify-between items-center px-4 pb-3">
<h3 class="text-[20px] font-bold text-text-secondary-light dark:text-text-secondary-dark">욕실</h3>
<span class="bg-border-light dark:bg-border-dark text-text-secondary-light dark:text-text-secondary-dark text-xs font-bold px-2 py-1 rounded">대기중</span>
</div>
<div class="px-4">
<label class="flex gap-x-3 py-3 items-start cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-border-light dark:border-border-dark bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">check</span>
</div>
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark peer-checked:text-text-secondary-light dark:peer-checked:text-text-secondary-dark peer-checked:line-through transition-all">세면대 및 변기 청소</p>
</label>
<label class="flex gap-x-3 py-3 items-start cursor-pointer group">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-border-light dark:border-border-dark bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity">check</span>
</div>
<p class="text-base font-medium leading-normal text-text-primary-light dark:text-text-primary-dark peer-checked:text-text-secondary-light dark:peer-checked:text-text-secondary-dark peer-checked:line-through transition-all">바닥 및 타일 물때 제거</p>
</label>
</div>
</div>
<!-- Supply Check -->
<div class="bg-surface-light dark:bg-surface-dark mb-4 py-4">
<div class="flex items-center gap-2 px-4 pb-3 border-b border-border-light dark:border-border-dark mb-3">
<span class="material-symbols-outlined text-primary text-[24px]">inventory_2</span>
<h3 class="text-lg font-bold">비품 점검</h3>
</div>
<div class="px-4 space-y-4">
<div class="flex justify-between items-center">
<span class="font-medium">휴지</span>
<div class="flex items-center gap-3">
<button class="bg-border-light dark:bg-border-dark text-text-secondary-light dark:text-text-secondary-dark px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors">충분</button>
<button class="border border-primary text-primary px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-primary/5 transition-colors">부족함</button>
</div>
</div>
<div class="flex justify-between items-center">
<span class="font-medium">쓰레기 봉투</span>
<div class="flex items-center gap-3">
<button class="bg-primary text-white px-3 py-1.5 rounded-lg text-sm font-medium">충분</button>
<button class="bg-border-light dark:bg-border-dark text-text-secondary-light dark:text-text-secondary-dark px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-black/5 dark:hover:bg-white/5 transition-colors">부족함</button>
</div>
</div>
</div>
</div>
<div class="px-4 pb-6">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-sm hover:bg-primary/90 transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                작업 완료 보고
            </button>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark">
<div class="flex justify-around items-center px-2 pb-safe pt-2">
<a class="flex flex-col items-center justify-center p-2 text-text-secondary-light dark:text-text-secondary-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">home</span>
<span class="text-[10px] font-medium mt-1">홈</span>
</a>
<a class="flex flex-col items-center justify-center p-2 text-primary" href="#">
<span class="material-symbols-outlined text-[24px] font-variation-settings-['FILL'1]">checklist</span>
<span class="text-[10px] font-bold mt-1">작업</span>
</a>
<a class="flex flex-col items-center justify-center p-2 text-text-secondary-light dark:text-text-secondary-dark hover:text-primary dark:hover:text-primary transition-colors relative" href="#">
<span class="material-symbols-outlined text-[24px]">chat</span>
<span class="absolute top-2 right-1.5 size-2 bg-red-500 rounded-full"></span>
<span class="text-[10px] font-medium mt-1">채팅</span>
</a>
<a class="flex flex-col items-center justify-center p-2 text-text-secondary-light dark:text-text-secondary-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="text-[10px] font-medium mt-1">프로필</span>
</a>
</div>
</div>
</body></html>
